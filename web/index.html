<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MioOJ</title>
    <link rel="stylesheet" href="/css/style_v2.css">
    <style>
    body.lc-white .nav-settings-btn{color:#7b8fdb!important}
    body.lc-white .nav-settings-btn:hover{color:#5b6fd0!important;background:rgba(123,143,219,0.10)!important}
    body.lc-white .btn-upload-bg{background:#f0f4ff!important;color:#7b8fdb!important;border-color:#c5d4ff!important}
    body.lc-white .btn-upload-bg:hover{color:#5b6fd0!important;border-color:#7b8fdb!important;background:#e0e9ff!important}
    body.lc-white .btn-reset-bg{background:#f0f4ff!important;color:#7b8fdb!important;border-color:#c5d4ff!important}
    body.lc-white .btn-reset-bg:hover{color:#5b6fd0!important;background:#e0e9ff!important;border-color:#7b8fdb!important}
    body.lc-white .btn-delete-bg{background:#fff1f0!important;color:#ff4d4f!important;border-color:#ffa39e!important}
    body.lc-white .btn-delete-bg:hover{background:#ffd8d7!important}
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ace.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/ext-language_tools.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <script>
        ace.config.set('basePath', 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.2/');
    </script>
</head>
<body>
    <div id="bg-layer"></div>
    <div id="bg-overlay"></div>

    <div id="app">
        <header id="navbar" style="display:none;">
            <div class="nav-brand">
                <a href="#/problems" class="brand-link" id="nav-brand">
                    <svg class="brand-mascot" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
                        <ellipse cx="16" cy="20" rx="11" ry="9" fill="#fcd9b8"/>
                        <path d="M7 14 L10 20 L5 19 Z" fill="#fcd9b8"/>
                        <path d="M25 14 L22 20 L27 19 Z" fill="#fcd9b8"/>
                        <circle cx="12" cy="19" r="1.8" fill="#1a1028"/>
                        <circle cx="20" cy="19" r="1.8" fill="#1a1028"/>
                        <circle cx="12.5" cy="18.5" r="0.6" fill="#fff"/>
                        <circle cx="20.5" cy="18.5" r="0.6" fill="#fff"/>
                        <ellipse cx="16" cy="22" rx="2.2" ry="1.3" fill="#d4af37"/>
                        <path d="M14 22 Q16 23.5 18 22" stroke="#b8860b" stroke-width="0.6" fill="none"/>
                    </svg>
                    MioOJ
                </a>
            </div>
            <nav id="nav-links">
                <a href="#/problems" id="nav-problems">题目</a>
                <a href="#/announcements" id="nav-announcements">公告</a>
                <a href="#/discussions" id="nav-discussions">讨论</a>
                <a href="#/user" id="nav-user">我的</a>
                <a href="#/admin" id="nav-admin" style="display:none;">管理</a>
                <a href="#/login" id="nav-login" style="display:none;">登录</a>
                <a href="#" id="nav-logout">退出</a>
            </nav>
            <img id="nav-avatar" src="" alt="" class="nav-avatar" style="display:none;" title="查看个人中心">
            <button class="nav-settings-btn" id="nav-settings-btn" title="设置">⚙</button>
        </header>
        <div id="crop-modal" style="display:none;">
            <div class="crop-backdrop"></div>
            <div class="crop-panel">
                <div class="crop-header">
                    <span>裁剪图片 — 选取你喜欢的区域</span>
                    <button class="crop-close" id="crop-close">&times;</button>
                </div>
                <div class="crop-body">
                    <canvas id="crop-canvas"></canvas>
                </div>
                <div class="crop-footer">
                    <button class="btn-secondary" id="crop-cancel">取消</button>
                    <button class="btn-primary" id="crop-confirm" style="width:auto; padding:8px 28px;">确认裁剪</button>
                </div>
            </div>
        </div>
        <div id="settings-panel">
            <h4>设置</h4>
            <div class="setting-row">
                <label>相册背景</label>
                <label class="toggle-switch on" id="toggle-effects"></label>
            </div>
            <div class="setting-row" id="setting-use-custom-bg" style="display:none;">
                <label>使用我的壁纸</label>
                <div class="setting-row-actions">
                    <label class="toggle-switch on" id="toggle-use-custom-bg"></label>
                    <button id="delete-bg-btn" class="btn-delete-bg" title="删除自定义壁纸">删除</button>
                </div>
            </div>
            <div class="setting-row">
                <label>上传背景</label>
                <button id="upload-bg-btn" class="btn-upload-bg">选择图片</button>
                <input type="file" id="upload-bg-input" accept="image/*" style="display:none;">
            </div>
            <div class="setting-row setting-row-avatar" id="setting-avatar-row">
                <label>上传头像</label>
                <button id="upload-avatar-btn" class="btn-upload-bg">选择图片</button>
                <input type="file" id="upload-avatar-input" accept="image/*" style="display:none;">
            </div>
            <div class="setting-row" id="setting-reset-avatar" style="display:none;">
                <label></label>
                <button id="reset-avatar-btn" class="btn-reset-bg">恢复默认头像</button>
            </div>
            <div class="setting-row setting-row-slider">
                <label>背景虚化 <span id="blur-value-label">0px</span></label>
                <input type="range" id="blur-slider" min="0" max="30" value="0">
            </div>
            <div class="setting-row">
                <label>代码自动补全</label>
                <label class="toggle-switch on" id="toggle-autocomplete"></label>
            </div>
            <div class="setting-row setting-row-reset">
                <button id="reset-bg-btn" class="btn-reset-bg">恢复默认</button>
            </div>
        </div>
        <main id="content">
            <div id="loading">加载中...</div>
        </main>
        <div id="toast-container" aria-live="polite"></div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/pages/login.js"></script>
    <script src="/js/pages/register.js"></script>
    <script src="/js/pages/problems.js"></script>
    <script src="/js/pages/problemDetail.js"></script>
    <script src="/js/pages/result.js"></script>
    <script src="/js/pages/userCenter.js"></script>
    <script src="/js/pages/admin.js"></script>
    <script src="/js/pages/adminQuestions.js"></script>
    <script src="/js/pages/adminQuestionEdit.js"></script>
    <script src="/js/pages/adminUsers.js"></script>
    <script src="/js/pages/adminAnnouncements.js"></script>
    <script src="/js/pages/announcements.js"></script>
    <script src="/js/pages/discussions.js"></script>
    <script src="/js/pages/discussionDetail.js"></script>
    <script src="/js/pages/problemComments.js"></script>
    <script src="/js/effects.js"></script>
</body>
</html>
